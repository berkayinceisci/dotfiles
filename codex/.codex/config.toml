model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
personality = "pragmatic"

# Auto-review: route sandbox-boundary approval prompts to a reviewer subagent
# instead of pausing for me. The reviewer engages ONLY when approvals are
# interactive (approval_policy = on-request or granular), so set it explicitly
# rather than relying on the undocumented default. sandbox_mode is explicit too,
# else non-git directories silently fall back to read-only.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
approvals_reviewer = "auto_review"

# Shared agent instructions live in ~/.agents/core.md, exposed to Codex via the
# ~/.codex/AGENTS.md symlink (created by bootstrap.sh). The core is ~36 KB, over
# the 32 KiB default cap, so raise the cap to load it in full with headroom
# for a project-level AGENTS.md stacked on top.
project_doc_max_bytes = 131072

[features]
goals = true

# Block writes to NFS/shared filesystems (local mounts + remote /proj, /share,
# /work) — same script Claude Code uses from settings.json. Blocks via exit 2.
[[hooks.PreToolUse]]
matcher = "^Bash$|^apply_patch$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = 'sh -c "$HOME/.agents/hooks/block-nfs-writes.sh"'
statusMessage = "Checking for NFS/shared writes"

[tui]
notifications = false
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "fast-mode",
  "context-used",
  "used-tokens",
  "five-hour-limit",
  "weekly-limit",
]

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 2

[notice]
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_rate_limit_model_nudge = true
fast_default_opt_out = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"
