[mgr]
ratio = [3, 4, 8]
sort_by = "natural"
show_hidden = true

[opener]
xopen = [
    { run = 'xopen "$@"', desc = "Open", for = "linux" },
    { run = 'open "$@"', desc = "Open", for = "macos" },
]

[[open.prepend_rules]]
url = "*/"
use = "xopen"

[[open.prepend_rules]]
mime = "application/pdf"
use = "xopen"

[preview]
wrap = "yes"
max_width = 4096
max_height = 4096
