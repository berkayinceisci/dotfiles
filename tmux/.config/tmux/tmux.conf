# Update SSH/display env vars when attaching from a new client. Covers both
# X11 (DISPLAY, XAUTHORITY) and Wayland (WAYLAND_DISPLAY), plus DBus for
# xdg-open-style helpers and the SSH-related vars used by xopen.
set -g update-environment "DISPLAY WAYLAND_DISPLAY XAUTHORITY DBUS_SESSION_BUS_ADDRESS SSH_CONNECTION SSH_CLIENT SSH_TTY LC_OPEN_HOST"

set -g mouse on
set -sg escape-time 0
setw -g monitor-activity on
# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000
# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# set -g default-terminal 'tmux-256color'
set -g default-terminal 'screen-256color'
set -sa terminal-features ',xterm-256color:RGB:clipboard'
set -s set-clipboard on

# Claude code changes appear on nvim buffer upon a pane switch
set -g focus-events on
set-hook -g pane-focus-out 'set -w monitor-activity off; run-shell -d 0.1 "tmux set -w monitor-activity on"'

if-shell 'test -f /usr/bin/zsh' \
    'set-option -g default-shell /usr/bin/zsh' \
    'if-shell "test -f ~/.local/bin/zsh" "set-option -g default-shell ~/.local/bin/zsh" "set-option -g default-shell /bin/zsh"'

setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

bind-key C-h previous-window
bind-key C-l next-window
bind-key C-j swap-window -t -1 \; previous-window
bind-key C-k swap-window -t +1 \; next-window

set-option -g renumber-windows on

# reload tmux config
bind-key r source-file ~/.config/tmux/tmux.conf

# toggle status bar
bind-key b set-option status

# Add a blank padding line between the status bar and the shell prompt.
# Snapshot the active status-format template into [1] (the lower line, holds
# the visible bar) and clear [0] (the upper line, becomes the gap).
#
# Gate the snapshot on a marker user-option: on `prefix r` the config is
# re-sourced, but by then status-format[0] is already '', so a naive re-snapshot
# would wipe out [1] and the bar would disappear. The marker makes the snapshot
# fire exactly once per tmux server lifetime. Re-snapshot manually with:
#   tmux set -gu @status-padding-applied ; tmux source-file ~/.config/tmux/tmux.conf
if-shell '[ -z "$(tmux show-option -gqv @status-padding-applied)" ]' \
    "set -Fg 'status-format[1]' '#{status-format[0]}' ; set -g @status-padding-applied yes"
set -g 'status-format[0]' ''
set -g status 2

# Vim aware pane switching
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-w if-shell "$is_vim" "send-keys C-w" "switch-client -T vimtable"

# is_claude detects a Claude Code pane by the process on its tty; used by the
# Ctrl+Backspace gate below.
is_claude="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +claude$'"

# Ctrl+Backspace = delete previous word, in Claude Code too. It arrives as C-h
# (^H, 0x08) and CC reads a bare ^H as a one-char backspace; its word-delete is
# Ctrl+W (0x17). So in claude panes only, inject C-w: send-keys writes the byte
# straight into the pane and bypasses the root C-w binding below, so it reaches
# CC as deleteWordBefore without hitting vimtable. Every other pane re-sends ^H
# unchanged (zsh: backward-kill-word via `bindkey '^H'`; nvim: <C-H>-><C-w>) so
# their existing Ctrl+Backspace keeps working.
bind-key -n C-h if-shell "$is_claude" "send-keys C-w" "send-keys C-h"

bind-key -T vimtable C-h select-pane -L \; switch-client -T root
bind-key -T vimtable C-j select-pane -D \; switch-client -T root
bind-key -T vimtable C-k select-pane -U \; switch-client -T root
bind-key -T vimtable C-l select-pane -R \; switch-client -T root
bind-key -T vimtable h select-pane -L \; switch-client -T root
bind-key -T vimtable j select-pane -D \; switch-client -T root
bind-key -T vimtable k select-pane -U \; switch-client -T root
bind-key -T vimtable l select-pane -R \; switch-client -T root

# Vim aware pane resizing
bind-key -n C-S-Left if-shell "$is_vim" 'send-keys C-S-Left' 'resize-pane -L 3'
bind-key -n C-S-Down if-shell "$is_vim" 'send-keys C-S-Down' 'resize-pane -D 3'
bind-key -n C-S-Up if-shell "$is_vim" 'send-keys C-S-Up' 'resize-pane -U 3'
bind-key -n C-S-Right if-shell "$is_vim" 'send-keys C-S-Right' 'resize-pane -R 3'

# Plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir "~/.config/tmux/resurrect"

# Restore Claude Code sessions per-pane. Base tmux-resurrect only re-launches a
# whitelist of programs (editors/pagers/top/htop) — NOT claude — so restored
# panes came back as empty shells. This plugin records each pane's claude
# session id (via a Claude Code SessionStart hook that writes a claude-<PID>.json
# state file) and rebuilds `claude --resume <id>` on restore. Capture
# CLAUDE_CONFIG_DIR so moatlab panes resume against the right profile.
# NB: the plugin's own `prefix+I` auto-config only edits ~/.claude/settings.json
# (default profile). We instead wire the SessionStart/SessionEnd hooks
# reproducibly into BOTH profiles' dotfiles settings.json (claude + claude-moatlab).
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @assistant-resurrect-capture-env 'CLAUDE_CONFIG_DIR'

set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-right false
set -g @minimal-tmux-left false
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-status-right-extra "#h | #(echo '#{pane_current_path}' | sed 's#$HOME#~#; s#\\([^/]*/[^/]*/\\).*\\(/[^/]*/.*\\)$#\\1 ... \\2#; s#/#/#g')"
# Refresh 'status-left' and 'status-right' more often, from every 15s to 1s
set -g status-interval 1

# tmux-continuum MUST be the LAST plugin. It enables auto-save by appending a
# hidden #(continuum_save.sh) hook to status-right; any status plugin loaded
# AFTER it (minimal-tmux-status) overwrites status-right and silently kills
# auto-save. Keeping it below minimal-tmux-status preserves the hook.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of
# tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
